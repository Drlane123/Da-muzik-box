<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Da Muzik Box — gold speaker cube (URL / tab icon) -->
  <defs>
    <linearGradient id="dmbGold" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0d78c"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6914"/>
    </linearGradient>
    <linearGradient id="dmbGoldLite" x1="8" y1="6" x2="24" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0a0f"/>
  <!-- Cube body -->
  <rect x="6" y="7" width="20" height="18" rx="3" fill="url(#dmbGold)" stroke="#f5e6a8" stroke-width="0.6"/>
  <!-- Top bevel -->
  <path d="M6.5 10.5 L16 6.5 L25.5 10.5" stroke="#fff1c2" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
  <!-- Center speaker -->
  <circle cx="16" cy="16.5" r="5.2" fill="#1a1208" stroke="#e8c96a" stroke-width="1.1"/>
  <circle cx="16" cy="16.5" r="3.1" fill="#0d0a06" stroke="#c9a227" stroke-width="0.7"/>
  <circle cx="16" cy="16.5" r="1.35" fill="url(#dmbGoldLite)"/>
  <!-- Side speakers -->
  <circle cx="10.2" cy="12.2" r="1.55" fill="#1a1208" stroke="#d4af37" stroke-width="0.55"/>
  <circle cx="21.8" cy="12.2" r="1.55" fill="#1a1208" stroke="#d4af37" stroke-width="0.55"/>
  <circle cx="10.2" cy="21.2" r="1.35" fill="#1a1208" stroke="#d4af37" stroke-width="0.5"/>
  <circle cx="21.8" cy="21.2" r="1.35" fill="#1a1208" stroke="#d4af37" stroke-width="0.5"/>
</svg>
