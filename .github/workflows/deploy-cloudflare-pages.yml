# Automatic deploy: every push to `main` builds with Bun and uploads `dist`
# to Cloudflare Pages project `da-muzik-box-f1` via Wrangler (Direct Upload).
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_ACCOUNT_ID          — Cloudflare account id
#   CLOUDFLARE_API_TOKEN           — API token with Pages edit (preferred)
#   OR both:
#   CLOUDFLARE_EMAIL               — Cloudflare login email
#   CLOUDFLARE_GLOBAL_API_KEY      — Global API Key
#
# Live URL: https://da-muzik-box-f1.pages.dev/
#
# Important: In Cloudflare → Workers & Pages → da-muzik-box-f1 → Settings,
# do NOT also connect a Git build that deploys `dist/` without a build step
# (dist is gitignored). Use this Actions workflow as the only deploy source.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Prepare Cloudflare credentials
        env:
          RAW_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RAW_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          RAW_GLOBAL_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
        run: |
          ACCOUNT="$(printf '%s' "$RAW_ACCOUNT_ID" | tr -d '\r\n[:space:]')"
          TOKEN="$(printf '%s' "$RAW_API_TOKEN" | tr -d '\r\n[:space:]')"
          EMAIL="$(printf '%s' "$RAW_EMAIL" | tr -d '\r\n[:space:]')"
          GLOBAL_KEY="$(printf '%s' "$RAW_GLOBAL_KEY" | tr -d '\r\n[:space:]')"

          if [ -z "$ACCOUNT" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID secret"
            exit 1
          fi

          echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT" >> "$GITHUB_ENV"

          if [ -n "$GLOBAL_KEY" ] && [ -n "$EMAIL" ]; then
            if [ "${#GLOBAL_KEY}" -lt 30 ]; then
              echo "CLOUDFLARE_GLOBAL_API_KEY looks too short (${#GLOBAL_KEY} chars)."
              exit 1
            fi
            echo "CLOUDFLARE_EMAIL=$EMAIL" >> "$GITHUB_ENV"
            echo "CLOUDFLARE_API_KEY=$GLOBAL_KEY" >> "$GITHUB_ENV"
            echo "Using Global API Key auth."
          elif [ -n "$TOKEN" ]; then
            if [ "${#TOKEN}" -lt 30 ]; then
              echo "CLOUDFLARE_API_TOKEN looks too short (${#TOKEN} chars)."
              echo "Use the one-time token secret from Create Token, or set CLOUDFLARE_EMAIL + CLOUDFLARE_GLOBAL_API_KEY instead."
              exit 1
            fi
            echo "CLOUDFLARE_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            echo "Using API token auth."
          else
            echo "Set either CLOUDFLARE_API_TOKEN or both CLOUDFLARE_EMAIL and CLOUDFLARE_GLOBAL_API_KEY."
            exit 1
          fi

      - name: Ensure Pages project exists
        run: |
          bunx wrangler@3.114.0 whoami
          bunx wrangler@3.114.0 pages project create da-muzik-box-f1 --production-branch=main || true

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          set -euo pipefail
          COMMIT_MSG="$(git log -1 --pretty=%s | tr -d '\r' | cut -c1-120)"
          echo "Deploying SHA=${GITHUB_SHA} branch=main project=da-muzik-box-f1"
          echo "Commit: ${COMMIT_MSG}"

          # Bind this Direct Upload to the real git commit (not --commit-dirty).
          bunx wrangler@3.114.0 pages deploy dist \
            --project-name=da-muzik-box-f1 \
            --branch=main \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="${COMMIT_MSG}"

          {
            echo "## Cloudflare Pages"
            echo "- Project: \`da-muzik-box-f1\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- URL: https://da-muzik-box-f1.pages.dev/"
          } >> "$GITHUB_STEP_SUMMARY"
