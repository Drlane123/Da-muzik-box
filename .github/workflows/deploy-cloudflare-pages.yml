name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Prepare Cloudflare credentials
        env:
          RAW_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RAW_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          RAW_GLOBAL_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
        run: |
          ACCOUNT="$(printf '%s' "$RAW_ACCOUNT_ID" | tr -d '\r\n[:space:]')"
          TOKEN="$(printf '%s' "$RAW_API_TOKEN" | tr -d '\r\n[:space:]')"
          EMAIL="$(printf '%s' "$RAW_EMAIL" | tr -d '\r\n[:space:]')"
          GLOBAL_KEY="$(printf '%s' "$RAW_GLOBAL_KEY" | tr -d '\r\n[:space:]')"

          if [ -z "$ACCOUNT" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID secret"
            exit 1
          fi

          echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT" >> "$GITHUB_ENV"

          if [ -n "$GLOBAL_KEY" ] && [ -n "$EMAIL" ]; then
            if [ "${#GLOBAL_KEY}" -lt 30 ]; then
              echo "CLOUDFLARE_GLOBAL_API_KEY looks too short (${#GLOBAL_KEY} chars)."
              exit 1
            fi
            echo "CLOUDFLARE_EMAIL=$EMAIL" >> "$GITHUB_ENV"
            echo "CLOUDFLARE_API_KEY=$GLOBAL_KEY" >> "$GITHUB_ENV"
            echo "Using Global API Key auth."
          elif [ -n "$TOKEN" ]; then
            if [ "${#TOKEN}" -lt 30 ]; then
              echo "CLOUDFLARE_API_TOKEN looks too short (${#TOKEN} chars)."
              echo "Use the one-time token secret from Create Token, or set CLOUDFLARE_EMAIL + CLOUDFLARE_GLOBAL_API_KEY instead."
              exit 1
            fi
            echo "CLOUDFLARE_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            echo "Using API token auth."
          else
            echo "Set either CLOUDFLARE_API_TOKEN or both CLOUDFLARE_EMAIL and CLOUDFLARE_GLOBAL_API_KEY."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          bunx wrangler@3.114.0 whoami
          bunx wrangler@3.114.0 pages project create da-muzik-box-f1 --production-branch=main || true
          bunx wrangler@3.114.0 pages deploy dist --project-name=da-muzik-box-f1 --branch=main --commit-dirty=true

      - name: Retire old da-muzik-box Pages project
        run: |
          set -euo pipefail
          URL="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/da-muzik-box"
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            RESP="$(curl -sS -w $'\n%{http_code}' -X DELETE "$URL" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")"
          else
            RESP="$(curl -sS -w $'\n%{http_code}' -X DELETE "$URL" \
              -H "X-Auth-Email: ${CLOUDFLARE_EMAIL}" \
              -H "X-Auth-Key: ${CLOUDFLARE_API_KEY}")"
          fi
          BODY="$(printf '%s\n' "$RESP" | sed '$d')"
          CODE="$(printf '%s\n' "$RESP" | tail -n1)"
          echo "DELETE da-muzik-box -> HTTP ${CODE}"
          echo "${BODY}"
          if [ "${CODE}" = "200" ] || [ "${CODE}" = "404" ]; then
            echo "Old URL retired (project deleted or already gone)."
            exit 0
          fi
          echo "::warning::Could not delete Pages project da-muzik-box (HTTP ${CODE}). API token likely cannot delete projects. Delete it once in Cloudflare Dashboard → Workers & Pages → da-muzik-box → Settings → Delete project so https://da-muzik-box.pages.dev dies."
          exit 0
