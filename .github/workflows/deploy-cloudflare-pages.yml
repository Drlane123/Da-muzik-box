name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Prepare Cloudflare credentials
        env:
          RAW_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RAW_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TOKEN="$(printf '%s' "$RAW_API_TOKEN" | tr -d '\r\n[:space:]')"
          ACCOUNT="$(printf '%s' "$RAW_ACCOUNT_ID" | tr -d '\r\n[:space:]')"
          TOKEN="${TOKEN#Bearer}"
          TOKEN="${TOKEN#bearer}"

          if [ -z "$TOKEN" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN secret"
            exit 1
          fi
          if [ -z "$ACCOUNT" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID secret"
            exit 1
          fi
          if [ "${#TOKEN}" -lt 30 ]; then
            echo "CLOUDFLARE_API_TOKEN looks too short (${#TOKEN} chars). Paste the full API token, not the Account ID."
            exit 1
          fi
          if [ "${#ACCOUNT}" -lt 20 ]; then
            echo "CLOUDFLARE_ACCOUNT_ID looks too short (${#ACCOUNT} chars)."
            exit 1
          fi

          echo "CLOUDFLARE_API_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT" >> "$GITHUB_ENV"
          echo "Cloudflare credentials prepared."

      - name: Deploy to Cloudflare Pages
        run: |
          bunx wrangler@3.114.0 whoami
          bunx wrangler@3.114.0 pages project create da-muzik-box --production-branch=main || true
          bunx wrangler@3.114.0 pages deploy dist --project-name=da-muzik-box --branch=main --commit-dirty=true
