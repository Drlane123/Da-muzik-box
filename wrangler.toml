# Da Muzik Box — Cloudflare Pages
# D1 binding is intentionally omitted until you create the database
# (invalid / placeholder database_id breaks `pages deploy`).
#
# When ready:
#   bun run billing:d1:create
# Paste database_id into the [[d1_databases]] block below, uncomment it, then:
#   bun run billing:d1:migrate:remote
# Redeploy Pages so /api/billing/status can use env.DB.

name = "da-muzik-box-f1"
compatibility_date = "2024-11-12"
pages_build_output_dir = "dist"

# [[d1_databases]]
# binding = "DB"
# database_name = "da-muzik-box-billing"
# database_id = "PASTE_ID_FROM_d1_create"
# migrations_dir = "migrations/billing"
